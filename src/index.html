<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDF Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1>MDF Viewer</h1>
      <p class="muted">View Microsoft SQL Server MDF files on macOS via Docker</p>

      <section class="card">
        <h2>Files</h2>
        <label>MDF File</label>
        <div class="file-row">
          <input id="mdfPath" type="text" readonly placeholder="No MDF file selected" />
          <button id="chooseMdf">Browse</button>
        </div>

        <label>Log File (optional)</label>
        <div class="file-row">
          <input id="ldfPath" type="text" readonly placeholder="No LDF file selected" />
          <button id="chooseLdf">Browse</button>
        </div>
      </section>

      <section class="card">
        <h2>Actions</h2>
        <div class="action-buttons">
          <button id="attachBtn" class="primary">Load Database</button>
          <button id="loadTablesBtn">Load Tables</button>
          <button id="exportBtn">Export CSV</button>
        </div>
      </section>

      <section class="card">
        <h2>Status</h2>
        <div id="status" class="status">Ready</div>
      </section>

      <section class="card log-card">
        <h2>Log</h2>
        <div id="log" class="log"></div>
      </section>
    </aside>

    <main class="main">
      <section class="content-card table-list-card">
        <div class="section-header">
          <h2>Tables</h2>
          <input id="tableSearch" type="text" placeholder="Search …" autocomplete="off" />
        </div>
        <ul id="tableList" class="table-list"></ul>
      </section>

      <section class="content-card viewer-card">
        <div class="section-header query-header">
          <h2>Data View</h2>
          <div class="query-bar">
            <textarea id="queryInput" rows="3" placeholder="SELECT TOP 100 * FROM dbo.YourTable"></textarea>
            <button id="runQueryBtn" class="primary">Run SQL</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="dataTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
